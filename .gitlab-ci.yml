variables:
  GIT_STRATEGY: clone
  GIT_SUBMODULE_STRATEGY: recursive
  # Enable colors in CI terminal
  TERM: ansi
  FORCE_COLOR: 1
  # Configure environment
  CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: /usr/pack/gcc-9.2.0-af/linux-x64/bin/gcc
  LLVM_SYS_120_PREFIX: /usr/pack/llvm-12.0.1-af
  CMAKE: cmake-3.18.1
  UV_CACHE_DIR: $CI_BUILDS_DIR/../cache/uv

default:
  # Allow interrupting long-running jobs when a new pipeline on the same branch is triggered
  interruptible: true
  timeout: 60m
  before_script:
    # The CI is configured such that the uv cache directory (`UV_CACHE_DIR`),
    # is located on the same file system outside of the build directory.
    # `uv` should try to hardlink files instead of copying them to save space
    - export UV_LINK_MODE=hardlink
    - source iis-setup.sh

##############
# Build docs #
##############

docs:
  script:
    - make docs

#####################
# Python unit tests #
#####################

pytest:
  script:
    - pytest

#################################
# Build Snitch cluster software #
#################################

snitch-cluster-sw:
  script:
    - make sw -j
  artifacts:
    paths:
      - sw/**/build/*.elf
    expire_in: 1 day

#######################
# Standalone IP tests #
#######################

# Build and run all individual IP testbenches.
# Currently missing IP tests:
# - snitch_vm
# - snitch_ipu
# - snitch_dma
# - snitch
snitch-ip-tests:
  parallel:
    matrix:
      - IP:
          - mem_interface
          - snitch_cluster
          - tcdm_interface
          - snitch_ssr
          - reqrsp_interface
  script:
    - cd hw/$IP
    - ./util/compile.sh
    - ./util/run_vsim.sh

####################
# Simulation tests #
####################

# Verilator
snitch-cluster-vlt:
  needs: [snitch-cluster-sw]
  script:
    - make verilator
    - cd test
    - ../util/experiments/run.py schnizo.yaml --simulator verilator -j --run-dir runs/vlt

# Questa
snitch-cluster-vsim:
  needs: [snitch-cluster-sw]
  script:
    # TODO(colluca): fix errors that appear when removing DEBUG=ON
    - make vsim DEBUG=ON -j
    - cd test
    - ../util/experiments/run.py schnizo-orig.yaml --simulator vsim -j --run-dir runs/schniz-orig
    - ../util/experiments/run.py schnizo.yaml --simulator vsim -j --run-dir runs/schnizo
    - ../util/experiments/run.py riscv_tests_isa.yaml --simulator vsim -j --run-dir runs/riscv_tests_isa
    # Test convenience Make target
    - cd ..
    - make vsim-run BINARY=$PWD/sw/kernels/blas/sz_axpy/build/sz_axpy.elf \
        VERIFY_PY=$PWD/sw/kernels/blas/sz_axpy/scripts/verify.py
    # Test trace annotation
    - make annotate -j
    # Test expected performance of AXPY kernel
    - grep -E "ipc\s+4.185" test/logs/sz_trace_hart_00000.txt
    # # Run additional, more extensive tests
    # - cd test/blas/gemm && ./test.sh && cd -
    # - cd test/dnn/transpose && ./test.sh && cd -
    # - cd test/dnn/flashattention_2 && ./test.sh && cd -
  artifacts:
    when: on_failure
    expire_in: 1 day
    paths:
      - test/runs/schnizo/**/sim.txt

schnizo-experiments:
  needs: [snitch-cluster-sw]
  script:
    - make vsim DEBUG=ON -j
    - cd experiments/schnizo_frep
    - ./experiments.py --actions sw run roi -j

# Test OmegaNet TCDM interconnect
snitch-cluster-omega-vsim:
  script:
    - make CFG_OVERRIDE=cfg/omega.json sw -j
    - make vsim DEBUG=ON -j
    - cd test
    - ../util/experiments/run.py schnizo-orig.yaml --simulator vsim -j --run-dir runs/vsim

