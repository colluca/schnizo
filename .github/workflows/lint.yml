# Run all lint checks
name: lint
on: [push, pull_request]

env:
  TERM: xterm-256color
  FORCE_COLOR: 1

jobs:

  ################
  # Verilog lint #
  ################

  verible-lint:
    name: Lint Verilog sources
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: colluca/verible-linter-action@main
        with:
          paths: |
            ./hw
          github_token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_error: true
          reviewdog_reporter: github-check
          extra_args: "--waiver_files util/lint/waiver.verible"
          verible_version: "v0.0-3318-g8d254167"
          artifact_name: 'verible-lint'

  strict-verible-lint:
    name: Lint Verilog sources (strict)
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: colluca/verible-linter-action@main
        with:
          config_file: './util/lint/rules.verible'
          paths: |
            ./hw/schnizo
          github_token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_error: true
          reviewdog_reporter: github-check
          extra_args: "--waiver_files util/lint/waiver.verible"
          verible_version: "v0.0-4051-g9fdb4057"
          artifact_name: 'verible-lint-strict'

  svlint:
    name: Lint Verilog sources (svlint)
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - uses: actions/checkout@v4
      - name: Install Bender
        uses: pulp-platform/pulp-actions/bender-install@v2.4.1
        with:
          version: 0.29.1
      - name: Checkout Bender dependencies
        shell: bash
        run: |
          bender checkout
      - name: Generate filelist
        shell: bash
        run: |
          cat > lint.f <<EOF
          +incdir+$(bender path common_cells | sed "s|^${GITHUB_WORKSPACE}/||")/include
          +incdir+hw/snitch/include
          EOF

          git ls-files "hw/schnizo/src/*.sv" | sort >> lint.f

          cat lint.f
      - name: Run svlint
        uses: colluca/svlint-action@master
        with:
          filelists: lint.f
          version: v0.9.5
        env:
          SVLINT_CONFIG: ${{ github.workspace }}/util/lint/svlint.toml

  #####################
  # Vendor Up-to-Date #
  #####################
  bender-vendor-up-to-date:
    name: Check bender vendor up-to-date
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: Check bender vendor up-to-date
        uses: pulp-platform/pulp-actions/bender-vendor-up-to-date@v2.1.0

  #################
  # Check License #
  #################
  license-lint:
    name: Check License headers
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: Check License
        uses: pulp-platform/pulp-actions/lint-license@v2.4.3
        with:
          linters_revision: 20250217_01
          # We cover ETH Zurich and lowRISC licenses and Apache 2.0
          # (mostly for SW) and Solderpad for the hardware.
          # yamllint disable rule:line-length
          license: |
            Copyright( \([c]\))?\s(\d{4}(-\d{4})?\s)?(ETH Zurich and University of Bologna|lowRISC contributors).
            (Solderpad Hardware License, Version 0.51|Licensed under the Apache License, Version 2.0), see LICENSE for details.
            SPDX-License-Identifier: (SHL-0.51|Apache-2.0)
          # yamllint enable rule:line-length
          match_regex: true
          exclude_paths: |
            sw/runtime/src/omp/interface.h
            hw/snitch_cluster/src/snitch_cluster_peripheral/snitch_cluster_peripheral_reg_pkg.sv
            hw/snitch_cluster/src/snitch_cluster_peripheral/snitch_cluster_peripheral_reg.sv
            hw/snitch_cluster/src/snitch_cluster_peripheral/snitch_cluster_peripheral_reg.svh

  ##################
  # Lint YML Files #
  ##################
  yaml-lint:
    name: Lint YAML Sources
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - uses: actions/checkout@v4
      - name: yaml-lint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: util/lint/.yamllint.yml

  ########################
  # Check Python Sources #
  ########################
  python-lint:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository
    name: Lint Python Sources
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4
      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: flake8 Lint
        uses: py-actions/flake8@v2
        with:
          flake8-version: "6.0.0"
          max-line-length: "100"

  ######################
  # Clang-Format Check #
  ######################
  # Check C/C++ files for correct formatting.
  clangfmt:
    name: Lint C/C++ Sources
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: DoozyX/clang-format-lint-action@v0.18.2
        with:
          clangFormatVersion: 10
